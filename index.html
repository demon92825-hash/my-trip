<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊規劃 - V15.20 首爾 6 天 5 夜</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #F8F9FB;           
            --color-black: #0F172A;       
            --color-dark-slate: #1E293B;  
            --color-dom-red: #922B21;     
            --color-grey-light: #F1F5F9;  
            --color-border: #E2E8F0;      
        }
        
        body { 
            font-family: 'Noto Sans TC', "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-page); 
            color: var(--color-black);
            user-select: none;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .poster-font { font-weight: 900 !important; letter-spacing: -0.01em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .day-btn {
            background-color: white; color: #64748B; border: 1.5px solid var(--color-border);
            width: 60px; height: 72px; border-radius: 12px; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-btn.active {
            background-color: var(--color-black); color: white; border-color: var(--color-black);
            box-shadow: 0 6px 15px rgba(15, 23, 42, 0.12);
        }

        .rich-card {
            background: white; border-radius: 20px; border: 1px solid var(--color-border);
            box-shadow: 0 4px 10px rgba(148, 163, 184, 0.04);
            overflow: visible;
        }

        .flight-ticket {
            border-radius: 18px; position: relative;
            border: 1px solid rgba(15, 23, 42, 0.05);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
            max-width: 100%; overflow: hidden; transition: all 0.4s ease;
        }
        .flight-intl { background-color: var(--color-dark-slate); color: white; }
        .flight-dom { background-color: var(--color-dom-red); color: #F1F5F9; }

        .flight-ticket::before, .flight-ticket::after {
            content: ''; position: absolute; top: 50%; width: 12px; height: 12px;
            background-color: var(--bg-page); border-radius: 50%; transform: translateY(-50%);
            z-index: 5;
        }
        .flight-ticket::before { left: -6px; }
        .flight-ticket::after { right: -6px; }

        .time-input-flight {
            text-align: center; width: 100%; background: transparent; border: none; outline: none;
            font-weight: 900; padding: 0; margin: 0; font-size: 24px; color: inherit;
            -webkit-appearance: none; appearance: none;
        }
        input[type="time"]::-webkit-calendar-picker-indicator { display: none; }

        .line-toggle-btn {
            font-size: 8px; font-weight: 900; padding: 1.5px 8px; border-radius: 5px;
            letter-spacing: 0.1em; transition: all 0.2s;
        }
        .flight-intl .line-active { background: white; color: var(--color-black); }
        .flight-intl .line-inactive { color: rgba(255,255,255,0.3); }
        .flight-dom .line-active { background: white; color: var(--color-dom-red); }
        .flight-dom .line-inactive { color: rgba(255,255,255,0.4); }

        .note-area {
            width: 100%; background-color: var(--color-grey-light); border: none; border-radius: 10px;
            outline: none; padding: 6px 12px; font-size: 13px; line-height: 1.5;
            min-height: 32px; height: 32px; resize: none; overflow: hidden;
        }

        .active-tab { color: var(--color-black); border-bottom: 4px solid var(--color-black); font-weight: 900; }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 2000; }
        .drag-handle { cursor: grab; padding: 10px; color: var(--color-border); font-size: 18px; z-index: 10; }
        
        .transport-row {
            display: flex; align-items: center; background: white; padding: 8px 12px;
            border-radius: 16px; border: 1px solid var(--color-border); width: 100%;
        }
        .trans-time-box { width: 130px; display: flex; align-items: center; justify-content: center; gap: 2px; }
        .trans-mode-box { width: 44px; flex-shrink: 0; }
        .trans-dur-box { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; }

        .toast-box {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background-color: var(--color-black); color: white; padding: 14px 28px; border-radius: 50px;
            font-size: 12px; font-weight: 900; white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 5000;
            display: flex; items: center; letter-spacing: 0.1em;
        }
        .toast-enter-active, .toast-leave-active { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast-enter-from, .toast-leave-to { opacity: 0; transform: translate(-50%, 30px); }

        .shop-menu {
            position: absolute; right: 0; top: 35px; background: white; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid var(--color-border);
            z-index: 50; overflow: hidden; min-width: 130px;
        }
        .shop-menu-item {
            padding: 14px 18px; font-size: 12px; font-weight: 700; border-bottom: 1px solid var(--color-grey-light);
            display: flex; items: center; gap: 8px; transition: background 0.2s; width: 100%;
        }
        .shop-menu-item:last-child { border-bottom: none; }
        .shop-menu-item:active { background: var(--color-grey-light); }

        .img-preview-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        input, select, textarea { cursor: pointer !important; pointer-events: auto !important; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative flex flex-col bg-[#F8F9FB] shadow-2xl">
        
        <!-- 雲端載入 -->
        <div v-if="isLoading" class="flex-1 flex flex-col items-center justify-center bg-white z-[3000]">
            <div class="relative w-16 h-16 mb-6">
                <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-slate-800"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-2xl">🌍</div>
            </div>
            <p class="text-xs font-black text-slate-400 tracking-[0.4em] uppercase italic">Setting up Seoul Trip...</p>
        </div>

        <!-- 初始建立頁 -->
        <div v-if="!isStarted && !isLoading" class="flex-1 flex flex-col items-center justify-center p-10 bg-white z-50">
            <div class="text-center mb-12">
                <div class="bg-slate-50 p-10 rounded-full inline-block mb-8 shadow-inner">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#1E293B" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-3xl poster-font tracking-widest text-slate-900 mb-2">開始新計畫</h1>
            </div>
            <div class="w-full max-w-[280px] space-y-5">
                <input v-model="newTripData.destination" type="text" placeholder="計畫名稱" class="w-full bg-slate-50 p-5 rounded-2xl text-center font-black text-xl outline-none border border-slate-100 shadow-sm">
                <div class="grid grid-cols-2 gap-3">
                    <input v-model="newTripData.startDate" type="date" class="bg-slate-50 p-4 rounded-2xl text-[10px] font-bold outline-none border border-slate-100">
                    <input v-model="newTripData.endDate" type="date" class="bg-slate-50 p-4 rounded-2xl text-[10px] font-bold outline-none border border-slate-100">
                </div>
                <button @click="createFirstTrip" :disabled="!newTripData.destination" class="w-full py-5 bg-[#0F172A] text-white rounded-2xl poster-font shadow-2xl mt-4 uppercase tracking-[0.3em] text-sm">Create Plan</button>
            </div>
        </div>

        <!-- 主操作畫面 -->
        <template v-if="isStarted && !isLoading">
            <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md px-6 pt-6 border-b border-slate-100 shadow-sm">
                <div class="flex justify-between items-start mb-5">
                    <div class="flex items-center min-w-0 flex-1">
                        <button @click="showTripList = true" class="p-2 -ml-2 text-slate-400 hover:text-slate-900 transition-colors"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                        <div class="ml-2 flex-1 min-w-0">
                            <input v-model="currentTrip.destination" @change="save" class="text-2xl poster-font text-slate-900 bg-transparent outline-none w-full border-none focus:ring-0">
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <div class="flex items-center space-x-4 mb-2">
                            <div class="flex space-x-4 text-xs poster-font text-slate-300">
                                <button @click="currentTab = 'schedule'" :class="{'active-tab pb-1': currentTab === 'schedule'}">行程</button>
                                <button @click="currentTab = 'shopping'" :class="{'active-tab pb-1': currentTab === 'shopping'}">購物</button>
                            </div>
                            <button @click="showMemo = true" class="text-2xl active:scale-90 transition-transform">📝</button>
                        </div>
                        <div class="text-[8px] flex items-center bg-slate-50 px-2.5 py-1 rounded-full border border-slate-100">
                            <span class="w-1.5 h-1.5 rounded-full mr-2" :class="isSynced ? 'bg-emerald-500' : 'bg-rose-400 animate-pulse'"></span>
                            <span class="text-slate-400 font-black uppercase tracking-tighter">{{ isSynced ? 'Ready' : 'Syncing' }}</span>
                        </div>
                    </div>
                </div>

                <div class="flex space-x-3 overflow-x-auto no-scrollbar pb-5 px-1">
                    <button v-for="(day, idx) in currentTrip?.schedule" :key="idx" 
                        @click="activeDayIndex = idx" 
                        class="day-btn" :class="{'active': activeDayIndex === idx}">
                        <span class="text-[9px] opacity-60 font-black">{{ formatShortDate(day.date) }}</span>
                        <span class="text-xs poster-font mt-1 uppercase">D{{ idx + 1 }}</span>
                    </button>
                </div>
            </header>

            <main class="flex-1 px-5 pb-28 overflow-y-auto no-scrollbar" @click="closeAllMenus">
                
                <!-- 行程分頁 -->
                <div v-show="currentTab === 'schedule'" class="space-y-4 pt-5">
                    <div class="flex justify-center space-x-3 mb-2">
                        <button @click="addItem('activity')" class="px-5 py-2 bg-white border border-slate-200 text-slate-700 text-[10px] poster-font rounded-2xl shadow-sm">+ 行程點</button>
                        <button @click="addItem('transport')" class="px-5 py-2 bg-white border border-slate-200 text-slate-700 text-[10px] poster-font rounded-2xl shadow-sm">+ 交通</button>
                        <button @click="addItem('flight')" class="px-5 py-2 bg-white border border-slate-200 text-slate-700 text-[10px] poster-font rounded-2xl shadow-sm">+ 機票</button>
                    </div>

                    <div id="sortable-schedule" class="space-y-5">
                        <div v-for="(item, idx) in activeDay.items" :key="item.id" :data-id="item.id">
                            
                            <!-- 纖薄機票票卷 -->
                            <div v-if="item.type === 'flight'" 
                                class="flight-ticket px-6 py-3.5 space-y-2.5 mx-auto w-full"
                                :class="item.flightType === 'domestic' ? 'flight-dom' : 'flight-intl'">
                                
                                <div class="flex justify-between items-center">
                                    <div class="flex bg-black/5 p-0.5 rounded-lg">
                                        <button @click="item.flightType = 'domestic'; save();" class="line-toggle-btn" :class="item.flightType === 'domestic' ? 'line-active' : 'line-inactive'">國內線</button>
                                        <button @click="item.flightType = 'international'; save();" class="line-toggle-btn" :class="item.flightType === 'international' ? 'line-active' : 'line-inactive'">國際線</button>
                                    </div>
                                    <div class="flex items-center">
                                        <div class="drag-handle opacity-30 mr-1 p-0">::</div>
                                        <button @click="requestRemoveItem(idx)" class="opacity-40 p-1 text-lg">×</button>
                                    </div>
                                </div>

                                <div class="flex justify-between items-center w-full">
                                    <div class="flex-1 text-center">
                                        <p class="text-[8px] font-black uppercase opacity-40 mb-0.5 tracking-widest">DEP</p>
                                        <input v-model="item.time" @change="save" type="time" class="time-input-flight">
                                    </div>
                                    <div class="px-3 flex flex-col items-center justify-center shrink-0">
                                        <div class="mb-0.5 opacity-60"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"></path></svg></div>
                                        <div class="w-6 border-t border-dashed border-white opacity-20"></div>
                                    </div>
                                    <div class="flex-1 text-center">
                                        <p class="text-[8px] font-black uppercase opacity-40 mb-0.5 tracking-widest">ARR</p>
                                        <input v-model="item.timeEnd" @change="save" type="time" class="time-input-flight">
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2 mt-1">
                                    <input v-model="item.airportStart" @input="save" placeholder="DEP AIRPORT" class="bg-black/5 text-[9px] font-black p-1.5 rounded-lg outline-none text-center uppercase border border-black/5">
                                    <input v-model="item.airportEnd" @input="save" placeholder="ARR AIRPORT" class="bg-black/5 text-[9px] font-black p-1.5 rounded-lg outline-none text-center uppercase border border-black/5">
                                </div>
                            </div>

                            <!-- 交通橫排 -->
                            <div v-else-if="item.type === 'transport'" class="transport-row">
                                <div class="drag-handle px-1 opacity-40">::</div>
                                <div class="trans-time-box">
                                    <input v-model="item.time" @change="save" type="time" class="text-[10px] font-black bg-slate-50 p-1.5 rounded-lg text-slate-700 w-full outline-none">
                                    <span class="text-slate-300">~</span>
                                    <input v-model="item.timeEnd" @change="save" type="time" class="text-[10px] font-black bg-slate-50 p-1.5 rounded-lg text-slate-700 w-full outline-none">
                                </div>
                                <div class="trans-mode-box px-1">
                                    <select v-model="item.mode" @change="save" class="text-[15px] bg-slate-50 p-1.5 rounded-xl outline-none border-none appearance-none text-center w-full">
                                        <option value="taxi">🚕</option><option value="subway">🚇</option><option value="walk">🚶</option><option value="car">🚗</option>
                                    </select>
                                </div>
                                <div class="trans-dur-box bg-slate-50 px-2 py-1.5 rounded-xl">
                                    <input v-model="item.duration" @input="save" placeholder="0" class="w-full bg-transparent text-center text-[11px] font-black outline-none border-none text-slate-700">
                                    <span class="text-[8px] text-slate-400 font-black ml-0.5 uppercase">M</span>
                                </div>
                                <button @click="requestRemoveItem(idx)" class="text-slate-300 hover:text-rose-500 text-xl px-2 font-bold transition-colors">×</button>
                            </div>

                            <!-- 行程卡片 -->
                            <div v-else class="rich-card p-3.5 space-y-3.5">
                                <div class="flex justify-between items-start">
                                    <div class="flex flex-col flex-1 space-y-2.5 min-w-0">
                                        <div class="flex items-center space-x-2">
                                            <input v-model="item.time" @change="save" type="time" class="text-[11px] font-black bg-slate-50 px-2 py-1.5 rounded-lg text-slate-900 w-22 border-none outline-none">
                                            <span class="text-[9px] text-slate-300 font-black uppercase tracking-tighter">to</span>
                                            <input v-model="item.timeLeave" @change="save" type="time" class="text-[11px] font-black bg-rose-50/70 px-2.5 py-2 rounded-lg text-rose-500 w-22 border-none outline-none">
                                        </div>
                                        <input v-model="item.title" @input="save" placeholder="行程標題" class="w-full poster-font text-lg bg-transparent border-none outline-none text-slate-900 focus:ring-0 truncate">
                                    </div>
                                    <div class="flex items-center">
                                        <div class="drag-handle px-2 opacity-40">::</div>
                                        <button @click="requestRemoveItem(idx)" class="text-slate-300 hover:text-rose-500 text-xl font-bold p-1">×</button>
                                    </div>
                                </div>
                                <div class="space-y-3">
                                    <div class="flex items-center space-x-2">
                                        <select v-model="item.category" @change="save" 
                                            class="text-[10px] font-black bg-slate-50 px-3 py-2.5 rounded-xl outline-none w-26 flex-shrink-0 text-center appearance-none border-none shadow-sm text-slate-700">
                                            <option value="住宿">🏨 住宿</option><option value="美食">🍱 美食</option><option value="景點">🎟️ 景點</option><option value="購物">🛍️ 購物</option>
                                        </select>
                                        <div class="flex-1 flex items-center bg-slate-50 px-3 py-2.5 rounded-xl min-w-0">
                                            <span class="text-xs mr-2 opacity-30">📍</span>
                                            <input v-model="item.address" @input="save" placeholder="地址..." class="flex-1 text-[11px] font-medium bg-transparent outline-none truncate text-slate-600">
                                        </div>
                                    </div>
                                    <textarea v-model="item.note" @input="handleAutoHeight($event.target); save()" placeholder="筆記備註..." class="note-area" @focus="handleAutoHeight($event.target)"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 購物分頁 -->
                <div v-show="currentTab === 'shopping'" class="space-y-8 pt-8 px-1">
                    <div v-for="act in shoppingActivities" :key="'shop-act-'+act.id" class="bg-white rounded-[28px] shadow-sm border border-slate-100 overflow-visible mb-6">
                        <div class="bg-slate-50 px-6 py-4 flex justify-between items-center border-b border-slate-100">
                            <h4 class="text-sm poster-font text-slate-800 truncate mr-4">📍 {{ act.title || '地點' }}</h4>
                            <button @click="addShopping(act)" class="text-[9px] px-4 py-2 bg-black text-white rounded-full poster-font shadow-lg">+ 新增清單</button>
                        </div>
                        <div class="p-5 space-y-8">
                            <div v-for="(shop, sIdx) in act.shopping" :key="shop.id" class="flex space-x-4 pb-6 border-b border-dashed border-slate-100 last:border-0 last:pb-0 relative">
                                <div class="w-20 h-20 bg-slate-50 rounded-[20px] border-2 border-dashed border-slate-200 flex items-center justify-center relative overflow-hidden shrink-0">
                                    <input type="file" accept="image/*" @change="handleImage(shop, $event)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                                    <img v-if="shop.photo" :src="shop.photo" class="w-full h-full object-cover">
                                    <span v-else class="text-slate-300 text-2xl">📸</span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex justify-between items-start mb-1">
                                        <input v-model="shop.name" @input="save" placeholder="名稱" class="poster-font text-base outline-none w-full bg-transparent text-slate-900 border-none p-0">
                                        <div class="relative">
                                            <button @click.stop="toggleShopMenu(shop.id)" class="text-slate-300 px-1 text-xl font-black">⋯</button>
                                            <div v-if="openedShopMenuId === shop.id" class="shop-menu shadow-2xl">
                                                <button @click="openImagePreview(shop.photo)" class="shop-menu-item" :class="!shop.photo ? 'opacity-20' : ''" :disabled="!shop.photo">👁️ 查看照片</button>
                                                <button @click="requestRemoveShoppingItem(act, sIdx)" class="shop-menu-item text-rose-500 font-bold">🗑️ 刪除項目</button>
                                            </div>
                                        </div>
                                    </div>
                                    <textarea v-model="shop.note" @input="handleAutoHeight($event.target); save()" placeholder="規格/價格/備註..." class="note-area bg-transparent p-0" @focus="handleAutoHeight($event.target)"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- 備忘錄 Modal -->
            <div v-if="showMemo" class="fixed inset-0 modal-overlay flex items-center justify-center p-6" style="z-index: 4000;">
                <div class="bg-white w-full max-w-sm rounded-[42px] shadow-2xl flex flex-col overflow-hidden max-h-[85vh]">
                    <div class="bg-slate-900 px-8 py-6 flex justify-between items-center text-white">
                        <div class="flex items-center space-x-4"><span class="text-2xl">📝</span><h3 class="text-lg poster-font tracking-widest uppercase">Trip Memo</h3></div>
                        <button @click="showMemo = false" class="text-slate-400 text-3xl font-light">×</button>
                    </div>
                    <div class="p-8 flex-1 overflow-y-auto bg-slate-50/50">
                        <textarea v-model="currentTrip.memo" @input="handleAutoHeight($event.target); save()" 
                            class="w-full bg-transparent outline-none text-slate-800 text-base font-medium leading-relaxed min-h-[400px] border-none focus:ring-0 resize-none p-0"
                            placeholder="在此記錄旅程重要事項..."></textarea>
                    </div>
                    <div class="p-6 bg-white border-t border-slate-100 text-center">
                        <button @click="showMemo = false" class="px-12 py-4 bg-slate-900 text-white rounded-2xl poster-font text-xs uppercase tracking-widest">Done</button>
                    </div>
                </div>
            </div>

            <!-- 計畫管理側邊欄 -->
            <div v-if="showTripList" class="fixed inset-0 modal-overlay flex items-end">
                <div class="w-full bg-white rounded-t-[48px] p-10 max-h-[85vh] overflow-y-auto shadow-2xl relative border-t border-slate-100">
                    <div class="flex justify-between items-center mb-10"><h3 class="text-xl poster-font text-slate-900 tracking-widest uppercase">Archive</h3><button @click="showTripList = false" class="text-slate-400 text-4xl font-light">×</button></div>
                    <div class="space-y-5">
                        <div v-for="t in trips" :key="t.id" class="p-6 rounded-[32px] border-2 transition-all flex justify-between items-center shadow-sm" 
                            :class="t.id === activeTripId ? 'border-slate-900 bg-slate-50' : 'border-slate-100 bg-white'" @click="switchTrip(t.id)">
                            <div class="poster-font text-slate-800 text-lg truncate mr-4 flex-1">{{ t.destination }}</div>
                            <button @click.stop="triggerDeleteTrip(t.id)" class="p-4 text-rose-500 bg-rose-50 rounded-2xl hover:bg-rose-100">🗑️</button>
                        </div>
                        <button @click="isStarted = false; showTripList = false;" class="w-full py-6 border-2 border-dashed border-slate-300 text-slate-400 rounded-[32px] poster-font text-sm mt-8 hover:bg-slate-50 uppercase tracking-widest">+ New Adventure</button>
                    </div>
                </div>
            </div>

            <!-- 安全刪除確認 -->
            <div v-if="confirmModal.show" class="fixed inset-0 modal-overlay flex items-center justify-center p-8" style="z-index: 9999;">
                <div class="bg-white w-full max-w-xs rounded-[44px] p-12 text-center space-y-8 shadow-2xl border border-rose-50">
                    <div class="w-22 h-22 bg-rose-50 rounded-full flex items-center justify-center mx-auto shadow-inner"><span class="text-rose-500 text-5xl font-black">!</span></div>
                    <div><h4 class="text-2xl poster-font text-slate-900">{{ confirmModal.title }}</h4><p class="text-sm text-slate-400 mt-4 font-medium">刪除後將無法恢復此紀錄。</p></div>
                    <div class="grid grid-cols-2 gap-5">
                        <button @click="confirmModal.show = false" class="py-5 bg-slate-100 text-slate-500 rounded-[20px] font-black uppercase tracking-widest">No</button>
                        <button @click="confirmModal.callback" class="py-5 bg-rose-600 text-white rounded-[20px] font-black shadow-lg uppercase">Delete</button>
                    </div>
                </div>
            </div>

            <!-- 照片預覽 Overlay -->
            <div v-if="previewImageUrl" class="img-preview-overlay" @click="previewImageUrl = null">
                <img :src="previewImageUrl" class="max-w-full max-h-full rounded-2xl shadow-2xl object-contain">
                <button class="absolute top-10 right-10 text-white text-4xl">×</button>
            </div>

            <!-- Toast 互動話語 -->
            <transition name="toast"><div v-if="toast.show" class="toast-box"><span>{{ toast.message }}</span></div></transition>

        </template>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA81nyMXbE3AZVw-ffD-WuaEu-HPS0TvPI",
            authDomain: "travel-43eb1.firebaseapp.com",
            projectId: "travel-43eb1",
            storageBucket: "travel-43eb1.firebasestorage.app",
            messagingSenderId: "642234143171",
            appId: "1:642234143171:web:13eb98dff98a7719c72d76"
        };

        const appId = 'shared-trip-v15-seoul-imported';
        const { createApp, ref, reactive, computed, watch, nextTick, onMounted } = Vue;

        createApp({
            setup() {
                const isLoading = ref(true);
                const isStarted = ref(false);
                const isSynced = ref(true);
                const trips = ref([]);
                const activeTripId = ref(null);
                const activeDayIndex = ref(0);
                const showTripList = ref(false);
                const showMemo = ref(false);
                const currentTab = ref('schedule');
                const newTripData = reactive({ destination: '', startDate: '', endDate: '' });
                const toast = reactive({ show: false, message: '' });
                const previewImageUrl = ref(null);
                const openedShopMenuId = ref(null);
                const confirmModal = reactive({ show: false, title: '', callback: null });
                let db;

                // 核心行程數據導航導入 (首爾 2026)
                const seoulTrip = {
                    id: 't-seoul-2026',
                    destination: '韓國首爾🇰🇷',
                    startDate: '2026-04-29',
                    endDate: '2026-05-04',
                    memo: '💡 韓國電子入境卡：https://www.e-arrivalcard.go.kr/portal/main/index.do?locale=CH\n\n💡 記得隨身攜帶護照，退稅時需要用到！\n\n💡 韓國便利商店 (GS25、CU、7-11) 必買清單要注意～',
                    schedule: [
                        { 
                            date: '2026-04-29', 
                            items: [
                                { id: 's1-f', type: 'flight', time: '15:15', timeEnd: '18:45', airportStart: 'TPE (BR0160)', airportEnd: 'ICN (Terminal 1)', flightType: 'international' },
                                { id: 's1-t1', type: 'transport', time: '19:15', timeEnd: '20:45', mode: 'car', duration: '90', note: '預約包車直達弘大住宿' },
                                { id: 's1-a1', type: 'activity', time: '21:30', timeEnd: '22:30', title: '豚壽百 (弘大店)', category: '美食', note: '體驗正宗豬肉湯飯，營業至 24:00', address: '首爾特別市麻浦區弘益路6街56' },
                                { id: 's1-a2', type: 'activity', time: '22:30', timeEnd: '23:30', title: 'Tangerine 住宿', category: '住宿', note: '辦理入房，超商美食體驗 (GS25/CU)' }
                            ] 
                        },
                        { 
                            date: '2026-04-30', 
                            items: [
                                { id: 's2-a1', type: 'activity', time: '09:00', timeEnd: '10:00', title: '早午餐', category: '美食', note: '弘大附近走路可達的咖啡店' },
                                { id: 's2-t1', type: 'transport', time: '10:00', timeEnd: '10:40', mode: 'taxi', duration: '40' },
                                { id: 's2-a2', type: 'activity', time: '10:40', timeEnd: '15:30', title: 'Zoolung Zoolung', category: '景點', note: '室內動物園半日遊' },
                                { id: 's2-t2', type: 'transport', time: '15:30', timeEnd: '16:30', mode: 'taxi', duration: '60', note: '前往明洞' },
                                { id: 's2-a3', type: 'activity', time: '16:30', timeEnd: '17:00', title: '大使館前換錢所', category: '景點', note: '預計換 10 萬台幣' },
                                { id: 's2-a4', type: 'activity', time: '17:30', timeEnd: '19:30', title: '明洞商圈逛街', category: '購物', note: '晚餐可選：一隻雞、雪濃湯、生肉' },
                                { id: 's2-a5', type: 'activity', time: '20:00', timeEnd: '21:30', title: '亂打秀 (Nanta)', category: '景點', note: '明洞劇場看秀' },
                                { id: 's2-t3', type: 'transport', time: '22:00', timeEnd: '22:30', mode: 'taxi', duration: '30' }
                            ] 
                        },
                        { 
                            date: '2026-05-01', 
                            items: [
                                { id: 's3-a1', type: 'activity', time: '09:00', timeEnd: '12:00', title: '景福宮 韓服體驗', category: '景點', note: '09:00 到店準備，10:30 拍攝', address: '서울시 종로구 자하문로 19' },
                                { id: 's3-a2', type: 'activity', time: '12:10', timeEnd: '13:30', title: '無垢屋 (午餐)', category: '美食', note: '12:00 開始遠端候補' },
                                { id: 's3-a3', type: 'activity', time: '13:30', timeEnd: '16:00', title: '北村/三清洞/益善洞', category: '景點', note: '散步逛街，可去倫敦貝果博物館' },
                                { id: 's3-a4', type: 'activity', time: '16:10', timeEnd: '19:00', title: '廣藏市場', category: '購物', note: '棉被攤、紫菜包飯、綠豆餅、生牛肉', address: '鍾路5街' },
                                { id: 's3-a5', type: 'activity', time: '19:00', timeEnd: '21:00', title: '布帳馬車體驗', category: '美食', note: '當地夜晚特色攤販' }
                            ] 
                        },
                        { 
                            date: '2026-05-02', 
                            items: [
                                { id: 's4-a1', type: 'activity', time: '09:00', timeEnd: '10:00', title: 'Isaac Toast', category: '美食', note: '韓國必吃早餐吐司' },
                                { id: 's4-a2', type: 'activity', time: '10:00', timeEnd: '13:00', title: 'Ocean Clinic 醫美', category: '景點', note: '江南站 5 號出口', address: '서울 서초구 강남대로 363' },
                                { id: 's4-a3', type: 'activity', time: '14:00', timeEnd: '20:00', title: '弘大商圈', category: '購物', note: '馬場洞韓牛、藍色眼影年糕、Puradak 炸雞' }
                            ] 
                        },
                        { 
                            date: '2026-05-03', 
                            items: [
                                { id: 's5-a1', type: 'activity', time: '09:00', timeEnd: '11:20', title: '狎鷗亭商圈', category: '購物', note: 'Wiggle Wiggle, Gentle Monster, Tamburins' },
                                { id: 's5-a2', type: 'activity', time: '11:30', timeEnd: '13:00', title: '烤豬肉 (燒肉)', category: '美食', note: '압구정고깃집 本店' },
                                { id: 's5-a3', type: 'activity', time: '13:30', timeEnd: '17:30', title: '聖水洞', category: '購物', note: 'Fwee, emis, DIOR, OliveYoungN', address: '성수' },
                                { id: 's5-a4', type: 'activity', time: '20:00', timeEnd: '22:00', title: '樂天超市', category: '購物', note: '購買伴手禮、糖果餅乾' }
                            ] 
                        },
                        { 
                            date: '2026-05-04', 
                            items: [
                                { id: 's6-t1', type: 'transport', time: '08:30', timeEnd: '09:40', mode: 'car', duration: '70', note: '包車前往機場' },
                                { id: 's6-f', type: 'flight', time: '12:05', timeEnd: '14:05', airportStart: 'ICN (CI0165)', airportEnd: 'KHH', flightType: 'international' }
                            ] 
                        }
                    ]
                };

                const triggerToast = (msg) => { toast.message = msg; toast.show = true; setTimeout(() => { toast.show = false; }, 2200); };
                const openImagePreview = (url) => { if(url) previewImageUrl.value = url; closeAllMenus(); };
                const toggleShopMenu = (id) => { openedShopMenuId.value = (openedShopMenuId.value === id) ? null : id; };
                const closeAllMenus = () => { openedShopMenuId.value = null; };

                onMounted(async () => {
                    try {
                        const app = initializeApp(firebaseConfig);
                        db = getFirestore(app);
                        const auth = getAuth(app);
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, (user) => {
                            if (user) {
                                onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'trips')), (snap) => {
                                    const data = [];
                                    snap.forEach(doc => data.push(doc.data()));
                                    
                                    // 如果雲端沒數據，且也沒有導入過，自動導入首爾計畫
                                    if (data.length === 0) {
                                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', seoulTrip.id), seoulTrip);
                                        trips.value = [seoulTrip];
                                        activeTripId.value = seoulTrip.id;
                                        isStarted.value = true;
                                    } else {
                                        trips.value = data;
                                        if (!activeTripId.value) { activeTripId.value = data[0].id; isStarted.value = true; }
                                    }
                                    isLoading.value = false;
                                    nextTick(() => { document.querySelectorAll('.note-area').forEach(el => handleAutoHeight(el)); });
                                });
                            }
                        });
                    } catch (e) { isLoading.value = false; }
                });

                const currentTrip = computed(() => trips.value.find(t => t.id === activeTripId.value) || { destination: '', schedule: [], memo: '' });
                const activeDay = computed(() => currentTrip.value?.schedule?.[activeDayIndex.value] || { items: [] });
                const shoppingActivities = computed(() => activeDay.value.items?.filter(i => i.type === 'activity' && i.category !== '住宿') || []);

                let timer;
                const save = async () => {
                    if (!currentTrip.value.id || !db) return;
                    isSynced.value = false;
                    clearTimeout(timer);
                    timer = setTimeout(async () => {
                        const ref = doc(db, 'artifacts', appId, 'public', 'data', 'trips', currentTrip.value.id);
                        await setDoc(ref, JSON.parse(JSON.stringify(currentTrip.value)));
                        isSynced.value = true;
                    }, 1000);
                };

                const createFirstTrip = async () => {
                    const id = 't-' + Date.now();
                    const start = new Date(newTripData.startDate);
                    const end = new Date(newTripData.endDate || newTripData.startDate);
                    const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    const schedule = Array.from({ length: isNaN(days) ? 1 : days }, (_, i) => {
                        const d = new Date(start); d.setDate(start.getDate() + i);
                        return { date: d.toISOString().split('T')[0], items: [] };
                    });
                    const trip = { id, destination: newTripData.destination, startDate: newTripData.startDate, endDate: newTripData.endDate, schedule, memo: '' };
                    activeTripId.value = id; isStarted.value = true;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', id), trip);
                    triggerToast("✨ 計畫已成功建立");
                };

                const addItem = (type) => {
                    if (!activeDay.value.items) activeDay.value.items = [];
                    const newItem = { id: 'i-'+Date.now(), type, time: '10:00', timeEnd: '11:00', timeLeave: '12:00', title: '', category: '景點', address: '', note: '', shopping: [], mode: 'taxi', duration: '30' };
                    if (type === 'flight') newItem.flightType = 'international';
                    activeDay.value.items.push(newItem);
                    if (type === 'activity') triggerToast("📍 行程點已加入");
                    if (type === 'transport') triggerToast("🚌 交通紀錄已更新");
                    if (type === 'flight') triggerToast("✈️ 航班資訊已加入");
                    save();
                    nextTick(() => { document.querySelectorAll('.note-area').forEach(el => handleAutoHeight(el)); });
                };

                const requestRemoveItem = (idx) => {
                    confirmModal.title = '要移除此行程？'; confirmModal.show = true;
                    confirmModal.callback = () => { activeDay.value.items.splice(idx, 1); save(); confirmModal.show = false; triggerToast("已移除行程"); };
                };

                const requestRemoveShoppingItem = (act, sIdx) => {
                    closeAllMenus();
                    confirmModal.title = '要刪除此購物項？'; confirmModal.show = true;
                    confirmModal.callback = () => { act.shopping.splice(sIdx, 1); save(); confirmModal.show = false; triggerToast("已刪除購物項"); };
                };

                const switchTrip = (id) => { activeTripId.value = id; activeDayIndex.value = 0; showTripList.value = false; };
                const triggerDeleteTrip = (id) => {
                    confirmModal.title = '確定刪除計畫？'; confirmModal.show = true;
                    confirmModal.callback = async () => {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', id));
                        if (activeTripId.value === id) activeTripId.value = null;
                        confirmModal.show = false; triggerToast("🗑️ 計畫已永久移除");
                    };
                };

                const addShopping = (act) => { if(!act.shopping) act.shopping = []; act.shopping.push({ id: Date.now(), name: '', note: '', photo: null }); save(); triggerToast("✨ 購物清單已新增"); };

                const handleImage = async (shop, event) => {
                    const file = event.target.files[0];
                    if (file) {
                        const reader = new FileReader(); reader.readAsDataURL(file);
                        reader.onload = (e) => {
                            const img = new Image(); img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas'); const MAX_WIDTH = 400;
                                let w = img.width; let h = img.height;
                                if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; }
                                canvas.width = w; canvas.height = h;
                                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                                shop.photo = canvas.toDataURL('image/jpeg', 0.5);
                                save(); triggerToast("📸 照片已成功同步");
                            };
                        };
                    }
                };

                const handleAutoHeight = (el) => { el.style.height = '32px'; if (el.scrollHeight > 32) el.style.height = el.scrollHeight + 'px'; };
                const formatShortDate = (d) => d ? d.split('-').slice(1).join('/') : '';

                watch([activeDayIndex, isStarted, currentTab], () => {
                    if (isStarted.value && currentTab.value === 'schedule') {
                        nextTick(() => {
                            const el = document.getElementById('sortable-schedule');
                            if (el) {
                                new Sortable(el, { handle: '.drag-handle', animation: 200, onEnd: (evt) => {
                                    const items = [...activeDay.value.items]; const [moved] = items.splice(evt.oldIndex, 1);
                                    items.splice(evt.newIndex, 0, moved); activeDay.value.items = items; save();
                                }});
                            }
                            document.querySelectorAll('.note-area').forEach(el => handleAutoHeight(el));
                        });
                    }
                });

                return { isLoading, isStarted, isSynced, trips, activeTripId, activeDayIndex, currentTrip, activeDay, shoppingActivities, newTripData, showTripList, showMemo, currentTab, toast, previewImageUrl, openedShopMenuId, confirmModal, openImagePreview, toggleShopMenu, closeAllMenus, createFirstTrip, addItem, requestRemoveItem, requestRemoveShoppingItem, save, switchTrip, triggerDeleteTrip, formatShortDate, addShopping, handleImage, handleAutoHeight };
            }
        }).mount('#app');
    </script>
</body>
</html>
