<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊規劃 - 雲端版 V15</title>
    <!-- 1. 先載入基礎工具 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --milk-tea-bg: #FDF8F5; --milk-tea-primary: #D5BDAF; --milk-tea-dark: #8D7B70; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--milk-tea-bg); color: var(--milk-tea-dark); touch-action: manipulation; }
        .input-equal { width: 100%; background-color: white; border: 1px solid #E3D5CA; border-radius: 12px; padding: 12px; outline: none; }
        .active-day { background-color: var(--milk-tea-primary); color: white; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative flex flex-col">
        
        <!-- 載入/錯誤診斷畫面 -->
        <div v-if="isLoading" class="flex-1 flex flex-col items-center justify-center bg-white p-10 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#D5BDAF] mb-6"></div>
            <p class="font-bold text-[#D5BDAF]">雲端系統啟動中...</p>
            <p v-if="errorMsg" class="text-[10px] text-red-400 mt-4 bg-red-50 p-3 rounded-lg">{{ errorMsg }}</p>
        </div>

        <!-- 初始建立頁 -->
        <div v-if="!isStarted && !isLoading" class="flex-1 flex flex-col items-center justify-center p-10 bg-white">
            <h1 class="text-xl font-bold mb-10 tracking-[0.2em]">建立旅遊計畫</h1>
            <input v-model="newTrip.destination" type="text" placeholder="要去哪裡玩？" class="input-equal mb-4">
            <button @click="createTrip" :disabled="!newTrip.destination" class="w-full py-4 bg-[#D5BDAF] text-white rounded-2xl font-bold shadow-lg">
                開始同步規劃
            </button>
        </div>

        <!-- 主畫面 -->
        <template v-if="isStarted && !isLoading">
            <header class="p-6 bg-white border-b sticky top-0 z-50">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">{{ currentTrip?.destination }}</h2>
                    <div class="w-2 h-2 rounded-full bg-green-400"></div>
                </div>
                <div class="flex space-x-2 overflow-x-auto pb-2">
                    <button v-for="(day, idx) in currentTrip?.schedule" @click="activeDayIdx = idx" :class="activeDayIdx === idx ? 'active-day' : 'bg-gray-50'" class="shrink-0 px-5 py-2 rounded-xl text-xs font-bold transition-all">DAY {{ idx + 1 }}</button>
                </div>
            </header>

            <main class="flex-1 p-5 space-y-4">
                <button @click="addItem" class="w-full py-3 border-2 border-dashed border-[#D5BDAF] text-[#D5BDAF] rounded-2xl font-bold text-xs">+ 新增景點</button>
                <div v-for="(item, idx) in currentTrip?.schedule[activeDayIdx].items" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50 flex items-center space-x-3">
                    <input v-model="item.time" @change="save" type="time" class="text-xs font-bold text-[#D5BDAF] outline-none border-none">
                    <input v-model="item.title" @input="save" placeholder="景點名稱" class="flex-1 font-bold text-sm outline-none border-none">
                    <button @click="currentTrip.schedule[activeDayIdx].items.splice(idx,1); save()" class="text-gray-300">×</button>
                </div>
            </main>
        </template>
    </div>

    <!-- 2. 將 Firebase 載入與 Vue 邏輯合併，解決 Destructure 錯誤 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA81nyMXbE3AZVw-ffD-Wua",
            authDomain: "travel-43eb1.firebaseapp.com",
            projectId: "travel-43eb1",
            storageBucket: "travel-43eb1.appspot.com",
            messagingSenderId: "642234143171",
            appId: "1:642234143171:web:13eb98dff90e0c05f56784"
        };

        const appId = 'my-final-trip-v15';
        const { createApp, ref, reactive, watch } = Vue;

        createApp({
            setup() {
                const isLoading = ref(true);
                const isStarted = ref(false);
                const errorMsg = ref("");
                const trips = ref([]);
                const activeTripId = ref(null);
                const activeDayIdx = ref(0);
                const newTrip = reactive({ destination: '' });
                let db;

                const startApp = async () => {
                    try {
                        const app = initializeApp(firebaseConfig);
                        db = getFirestore(app);
                        const auth = getAuth(app);
                        await signInAnonymously(auth);

                        onAuthStateChanged(auth, (user) => {
                            if (user) {
                                const path = collection(db, 'artifacts', appId, 'public', 'data', 'trips');
                                onSnapshot(query(path), (snap) => {
                                    const data = [];
                                    snap.forEach(doc => data.push(doc.data()));
                                    trips.value = data;
                                    if (data.length > 0 && !activeTripId.value) {
                                        activeTripId.value = data[0].id;
                                        isStarted.value = true;
                                    }
                                    isLoading.value = false;
                                }, (err) => {
                                    errorMsg.value = "Firebase 權限錯誤：請檢查 Firestore Rules 是否為 true";
                                });
                            }
                        });
                    } catch (e) {
                        errorMsg.value = "啟動失敗：" + e.message;
                    }
                };

                startApp();

                const currentTrip = ref(null);
                watch([trips, activeTripId], () => {
                    currentTrip.value = trips.value.find(t => t.id === activeTripId.value);
                }, { immediate: true });

                let timer;
                const save = async () => {
                    if (!currentTrip.value) return;
                    clearTimeout(timer);
                    timer = setTimeout(async () => {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', currentTrip.value.id), JSON.parse(JSON.stringify(currentTrip.value)));
                    }, 800);
                };

                const createTrip = async () => {
                    const id = 't-' + Date.now();
                    const trip = { id, destination: newTrip.destination, schedule: [{ items: [] }, { items: [] }, { items: [] }] };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', id), trip);
                    activeTripId.value = id;
                    isStarted.value = true;
                };

                const addItem = () => {
                    currentTrip.value.schedule[activeDayIdx.value].items.push({ time: '10:00', title: '' });
                    save();
                };

                return { isLoading, isStarted, errorMsg, currentTrip, newTrip, createTrip, addItem, save, activeDayIdx };
            }
        }).mount('#app');
    </script>
</body>
</html>
