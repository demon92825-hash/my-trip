<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊規劃 - 雲端共編 V15</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, query };
    </script>

    <style>
        :root {
            --milk-tea-bg: #FDF8F5;
            --milk-tea-primary: #D5BDAF;
            --milk-tea-secondary: #E3D5CA;
            --milk-tea-dark: #8D7B70;
            --milk-tea-accent: #F5EBE0;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--milk-tea-bg); 
            color: var(--milk-tea-dark);
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .ticket-card {
            background: white; border-radius: 16px; position: relative; border: 1px solid #F5EBE0;
        }
        .ticket-card::before, .ticket-card::after {
            content: ''; position: absolute; top: 55%; width: 14px; height: 14px;
            background-color: var(--milk-tea-bg); border-radius: 50%; transform: translateY(-50%); z-index: 5;
            border: 1px solid #F5EBE0;
        }
        .ticket-card::before { left: -8px; border-left: none; }
        .ticket-card::after { right: -8px; border-right: none; }

        .active-tab { color: var(--milk-tea-dark); border-bottom: 2px solid var(--milk-tea-primary); }
        .active-day { background-color: var(--milk-tea-primary); color: white; box-shadow: 0 4px 10px rgba(213, 189, 175, 0.3); }

        .input-equal {
            width: 100%; background-color: #FDF8F5; border: none; border-radius: 12px;
            outline: none; padding: 12px 14px; font-size: 14px;
        }

        .modal-overlay { background-color: rgba(141, 123, 112, 0.4); backdrop-filter: blur(4px); }
        .drag-handle { cursor: grab; padding: 12px; }
        .drag-handle:active { cursor: grabbing; }

        .sync-light { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        button:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen relative flex flex-col bg-[#FDF8F5] shadow-2xl">
        
        <!-- 雲端同步狀態顯示 -->
        <div v-if="isLoading" class="flex-1 flex items-center justify-center bg-white z-[100]">
            <div class="text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#D5BDAF] mx-auto"></div>
                <p class="mt-4 text-xs text-[#D5BDAF] font-bold tracking-widest">雲端計畫連線中...</p>
            </div>
        </div>

        <!-- 初始畫面 -->
        <transition name="fade">
            <div v-if="!isStarted && !isLoading" class="flex-1 flex flex-col items-center justify-center p-10 bg-white z-50">
                <div class="relative mb-10">
                    <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#D5BDAF" stroke-width="1.2"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rotate-[25deg] text-[#8D7B70]"><component is="svg-plane" class="w-8 h-8"></component></div>
                </div>
                <h1 class="text-xl font-bold mb-8 tracking-[0.3em] text-[#8D7B70]">我們的旅遊計畫</h1>
                
                <div class="w-full max-w-[240px] space-y-5">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest ml-1">目的地</label>
                        <input v-model="newTripData.destination" type="text" placeholder="去哪裡玩？" class="input-equal focus:ring-1 focus:ring-[#D5BDAF]">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest ml-1">開始日期</label>
                        <input v-model="newTripData.startDate" type="date" class="input-equal text-gray-400">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest ml-1">結束日期</label>
                        <input v-model="newTripData.endDate" type="date" class="input-equal text-gray-400">
                    </div>
                    <button @click="createFirstTrip" :disabled="!isReady" class="w-full py-4 bg-[#D5BDAF] text-white rounded-2xl font-bold shadow-lg mt-4 text-sm tracking-widest">
                        建立雲端計畫
                    </button>
                </div>
            </div>
        </transition>

        <!-- 主頁面 -->
        <template v-if="isStarted && !isLoading">
            <header class="sticky top-0 z-40 bg-[#FDF8F5]/95 backdrop-blur-md px-6 pt-6 border-b border-[#F5EBE0]/30 shadow-sm">
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center min-w-0 flex-1">
                        <button @click="showTripList = true" class="p-2 -ml-2 text-[#D5BDAF] hover:bg-[#F5EBE0] rounded-xl transition-all">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </button>
                        <h2 class="text-lg font-bold text-[#8D7B70] tracking-wider truncate ml-2 mr-4">{{ currentTrip?.destination }}</h2>
                    </div>
                    <div class="flex flex-col items-end">
                        <div class="flex space-x-6 text-xs font-bold text-gray-300 mb-1">
                            <button @click="currentTab = 'schedule'" :class="{'active-tab pb-1': currentTab === 'schedule'}">行程</button>
                            <button @click="currentTab = 'shopping'" :class="{'active-tab pb-1': currentTab === 'shopping'}">購物</button>
                        </div>
                        <div class="text-[8px] text-gray-300 flex items-center">
                            <span class="sync-light" :class="isSynced ? 'bg-green-400' : 'bg-amber-400'"></span>{{ isSynced ? '已同步' : '同步中' }}
                        </div>
                    </div>
                </div>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-3">
                    <button v-for="(day, idx) in currentTrip?.schedule" :key="idx" 
                        @click="activeDayIndex = idx"
                        :class="activeDayIndex === idx ? 'active-day' : 'bg-white text-gray-300 border border-[#F5EBE0]'"
                        class="shrink-0 w-12 h-14 rounded-xl flex flex-col items-center justify-center transition-all">
                        <span class="text-[7px] font-bold opacity-60">{{ formatShortDate(day.date) }}</span>
                        <span class="text-xs font-bold">DAY {{ idx + 1 }}</span>
                    </button>
                </div>
            </header>

            <main class="flex-1 px-5 pb-24 overflow-y-auto no-scrollbar">
                <div v-show="currentTab === 'schedule'" class="space-y-4 pt-4">
                    <div class="flex justify-center space-x-2 mb-4">
                        <button @click="addItem('activity')" class="px-5 py-1.5 bg-white border border-[#D5BDAF] text-[#D5BDAF] text-[10px] font-bold rounded-full shadow-sm">行程</button>
                        <button @click="addItem('transport')" class="px-5 py-1.5 bg-white border border-[#D5BDAF] text-[#D5BDAF] text-[10px] font-bold rounded-full shadow-sm">交通</button>
                        <button @click="addItem('flight')" class="px-5 py-1.5 bg-white border border-[#D5BDAF] text-[#D5BDAF] text-[10px] font-bold rounded-full shadow-sm">機票</button>
                    </div>
                    <div id="sortable-schedule" class="space-y-4 min-h-[200px]">
                        <div v-for="(item, idx) in activeDay.items" :key="item.id" :data-id="item.id">
                            <!-- 結構與 V10 一致 -->
                            <div v-if="item.type === 'flight'" class="ticket-card shadow-sm p-4 space-y-3">
                                <div class="flex justify-between items-center"><div class="flex items-center space-x-2"><component is="svg-plane" class="w-3.5 h-3.5 text-[#D5BDAF]"></component><span class="text-[8px] font-bold text-[#D5BDAF] tracking-widest uppercase">Flight Info</span></div><div class="flex items-center space-x-2"><div class="drag-handle text-gray-200"><component is="svg-drag" class="w-3.5 h-3.5"></component></div><button @click="removeItem(idx)" class="text-gray-200 p-1"><component is="svg-close" class="w-3.5 h-3.5"></component></button></div></div>
                                <div class="flex justify-between items-center px-1">
                                    <div class="text-center flex-1 min-w-0"><input v-model="item.timeStart" @change="saveCurrentTrip" type="time" class="text-lg font-bold outline-none bg-transparent w-full text-center text-[#8D7B70] border-none"><input v-model="item.airportStart" @input="saveCurrentTrip" placeholder="起飛" class="text-[8px] text-gray-300 bg-transparent w-full text-center outline-none border-none"></div>
                                    <div class="px-2 flex flex-col items-center shrink-0"><select v-model="item.flightType" @change="saveCurrentTrip" class="text-[7px] font-bold text-[#D5BDAF] bg-transparent outline-none appearance-none border-none"><option value="intl">國際</option><option value="dom">國內</option></select><div class="w-8 border-t border-dashed border-[#D5BDAF] mt-1"></div></div>
                                    <div class="text-center flex-1 min-w-0"><input v-model="item.timeEnd" @change="saveCurrentTrip" type="time" class="text-lg font-bold outline-none bg-transparent w-full text-center text-[#8D7B70] border-none"><input v-model="item.airportEnd" @input="saveCurrentTrip" placeholder="抵達" class="text-[8px] text-gray-300 bg-transparent w-full text-center outline-none border-none"></div>
                                </div>
                            </div>
                            <div v-else-if="item.type === 'transport'" class="bg-white/90 px-4 py-2 rounded-2xl shadow-sm border border-[#F5EBE0] flex items-center justify-between">
                                <div class="flex items-center space-x-2 flex-1 min-w-0">
                                    <div class="text-[#D5BDAF] w-5 h-5 flex items-center justify-center shrink-0"><component :is="getTransportSVG(item.mode)" class="w-4 h-4"></component></div>
                                    <select v-model="item.mode" @change="saveCurrentTrip" class="text-[10px] font-bold bg-transparent outline-none text-[#8D7B70] appearance-none cursor-pointer w-16 border-none"><option value="taxi">計程車</option><option value="subway">地鐵</option><option value="walk">走路</option></select>
                                    <div class="flex items-center space-x-1 ml-auto mr-3"><input v-model="item.duration" @input="saveCurrentTrip" type="number" class="w-8 bg-[#FDF8F5] py-0.5 rounded-lg text-[10px] font-bold text-center outline-none border-none"><span class="text-[8px] text-gray-300 font-bold uppercase tracking-tighter">Min</span></div>
                                </div>
                                <div class="flex items-center space-x-2"><div class="drag-handle text-gray-200"><component is="svg-drag" class="w-3.5 h-3.5"></component></div><button @click="removeItem(idx)" class="text-gray-200 p-1"><component is="svg-close" class="w-3.5 h-3.5"></component></button></div>
                            </div>
                            <div v-else class="bg-white p-4 rounded-2xl shadow-sm border border-[#F5EBE0] space-y-3 overflow-hidden">
                                <div class="flex justify-between items-start">
                                    <div class="flex items-center space-x-2 flex-1 min-w-0"><input v-model="item.timeStart" @change="saveCurrentTrip" type="time" class="text-[10px] font-bold outline-none bg-[#FDF8F5] px-1.5 py-1 rounded-lg text-[#D5BDAF] w-16 shrink-0 border-none"><input v-model="item.title" @input="saveCurrentTrip" placeholder="景點名稱" class="flex-1 min-w-0 font-bold text-sm outline-none border-b border-transparent focus:border-[#D5BDAF]/30 text-[#8D7B70]"></div>
                                    <div class="flex items-center space-x-2 ml-2 shrink-0"><div class="drag-handle text-gray-200"><component is="svg-drag" class="w-3.5 h-3.5"></component></div><button @click="removeItem(idx)" class="text-gray-200 p-1"><component is="svg-close" class="w-3.5 h-3.5"></component></button></div>
                                </div>
                                <div class="space-y-2">
                                    <div class="flex items-center space-x-2">
                                        <div class="relative w-24 shrink-0"><div class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[#D5BDAF] pointer-events-none"><component :is="getCategorySVG(item.category)" class="w-3 h-3"></component></div><select v-model="item.category" @change="saveCurrentTrip" class="text-[9px] font-bold text-[#D5BDAF] bg-[#FDF8F5] pl-8 pr-2 py-2 rounded-xl outline-none appearance-none w-full border-none shadow-inner"><option value="美食">美食</option><option value="景點">景點</option><option value="購物">購物</option><option value="住宿">住宿</option></select></div><input v-model="item.address" @input="saveCurrentTrip" placeholder="詳細地址" class="flex-1 min-w-0 text-[9px] bg-[#FDF8F5] px-3 py-2 rounded-xl outline-none border-none">
                                    </div>
                                    <textarea v-model="item.note" @input="saveCurrentTrip" placeholder="詳細備註..." rows="1" class="w-full text-[9px] bg-[#FDF8F5] px-3 py-2 rounded-xl outline-none resize-none border-none"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-show="currentTab === 'shopping'" class="space-y-6 pt-6">
                    <h3 class="text-[10px] font-bold text-[#8D7B70] tracking-[0.2em] uppercase opacity-40 px-1">Checklist</h3>
                    <div v-for="act in shoppingActivities" :key="'shop-act-'+act.id" class="bg-white rounded-2xl shadow-sm border border-[#F5EBE0] overflow-hidden">
                        <div class="bg-[#F5EBE0]/20 px-4 py-3 flex justify-between items-center border-b border-[#F5EBE0]/30"><div class="flex items-center space-x-2"><component :is="getCategorySVG(act.category)" class="w-3.5 h-3.5 text-[#D5BDAF]"></component><h4 class="text-xs font-bold text-[#8D7B70]">{{ act.title || '景點' }}</h4></div><button @click="addShopping(act)" class="text-[8px] px-2.5 py-1 bg-[#D5BDAF] text-white rounded-lg font-bold transition-all active:scale-90">+ 新增</button></div>
                        <div class="p-4 space-y-4">
                            <div v-for="(shop, sIdx) in act.shopping" :key="shop.id" class="flex space-x-3 pb-3 border-b border-dashed border-gray-100 last:border-0 last:pb-0">
                                <div class="w-14 h-14 bg-[#FDF8F5] rounded-xl border-2 border-dashed border-[#E3D5CA] flex items-center justify-center relative overflow-hidden shrink-0"><input type="file" @change="handleImage(shop, $event)" class="absolute inset-0 opacity-0 cursor-pointer z-10"><img v-if="shop.photo" :src="shop.photo" class="w-full h-full object-cover"><component is="svg-camera" v-else class="w-4 h-4 text-[#E3D5CA]"></component></div>
                                <div class="flex-1 min-w-0 space-y-1"><div class="flex justify-between items-center"><input v-model="shop.name" @input="saveCurrentTrip" placeholder="想買什麼？" class="font-bold text-xs outline-none w-full bg-transparent text-[#8D7B70] border-none"><button @click="act.shopping.splice(sIdx, 1); saveCurrentTrip();" class="text-gray-200 p-1"><component is="svg-close" class="w-2.5 h-2.5"></component></button></div><textarea v-model="shop.note" @input="saveCurrentTrip" placeholder="細節..." rows="1" class="w-full text-[9px] text-gray-400 outline-none bg-transparent resize-none border-none"></textarea></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- 旅程管理 Modal -->
            <div v-if="showTripList" class="fixed inset-0 z-50 modal-overlay flex items-end">
                <div class="w-full bg-white rounded-t-[32px] p-8 max-h-[80vh] overflow-y-auto shadow-2xl">
                    <div class="flex justify-between items-center mb-8"><h3 class="text-xl font-bold text-[#8D7B70]">我們的旅程</h3><button @click="showTripList = false" class="p-2 text-gray-300"><component is="svg-close" class="w-6 h-6"></component></button></div>
                    <div class="space-y-4">
                        <div v-for="t in trips" :key="t.id" class="p-5 rounded-2xl flex items-center justify-between border-2 transition-all" :class="t.id === activeTripId ? 'border-[#D5BDAF] bg-[#FDF8F5]' : 'border-gray-50 bg-white'">
                            <div class="flex-1 min-w-0" @click="switchTrip(t.id)"><input v-model="t.destination" @change="saveTripName(t)" @click.stop class="font-bold text-base bg-transparent border-none outline-none focus:ring-0 p-0 text-[#8D7B70] w-full"><p class="text-[10px] text-gray-400 mt-1">{{ t.startDate }} — {{ t.endDate }}</p></div>
                            <button @click.stop="confirmDelete(t.id)" class="text-gray-300 hover:text-red-400 p-2 transition-colors"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                        </div>
                        <button @click="startNewTripFlow" class="w-full py-4 border-2 border-dashed border-[#D5BDAF] text-[#D5BDAF] rounded-2xl font-bold text-sm mt-4">+ 建立新計畫</button>
                    </div>
                </div>
            </div>

            <!-- 刪除確認 Modal -->
            <div v-if="deleteTarget" class="fixed inset-0 z-[60] modal-overlay flex items-center justify-center p-6">
                <div class="bg-white w-full max-w-xs rounded-[32px] p-8 text-center space-y-6 shadow-2xl">
                    <h4 class="text-lg font-bold text-[#8D7B70]">確定刪除嗎？</h4>
                    <p class="text-[11px] text-gray-400 mt-2 leading-relaxed">一旦刪除，所有人的畫面都會同步消失且不可復原。</p>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button @click="deleteTarget = null" class="py-3 bg-gray-100 text-gray-500 rounded-xl text-xs">取消</button>
                        <button @click="doDelete" class="py-3 bg-red-500 text-white font-bold rounded-xl text-xs">確定刪除</button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- V10 辨識度圖示 (SVG) -->
    <script type="text/x-template" id="svg-plane"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5s-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-1.1-.2-2.1.5-2.4 1.5l-.4 1.3 8.3 4.6-3.7 3.7-2.3-.8c-.6-.2-1.3 0-1.7.5L2 19.5l2.3.8.8 2.3c.5.4 1.1.7 1.7.5l2-1.1c.5-.4.7-1.1.5-1.7l-.8-2.3 3.7-3.7 4.6 8.3 1.3-.4c1-.3 1.7-1.3 1.5-2.4z"></path></svg></script>
    <script type="text/x-template" id="svg-food"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path><path d="M13 15h0"></path><path d="M18 11.5a2.5 2.5 0 0 1 5 0V15a2.5 2.5 0 0 1-5 0Z"></path></svg></script>
    <script type="text/x-template" id="svg-attraction"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3ZM5 21V10M19 21V10M9 21v-4a2 2 0 0 1 4 0v4"></path></svg></script>
    <script type="text/x-template" id="svg-hotel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16M2 11h18M2 17h18M22 20v-8a2 2 0 0 0-2-2H11M7 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"></path></svg></script>
    <script type="text/x-template" id="svg-shopping"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"></path><path d="M3 6h18M16 10a4 4 0 0 1-8 0"></path></svg></script>
    <script type="text/x-template" id="svg-taxi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="8" rx="2"></rect><path d="m5 11 2-4h10l2 4"></path><circle cx="7" cy="15" r="1"></circle><circle cx="17" cy="15" r="1"></circle></svg></script>
    <script type="text/x-template" id="svg-subway"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="12" rx="2"></rect><path d="M4 11h16M7 15v4M17 15v4"></path></svg></script>
    <script type="text/x-template" id="svg-walk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"></circle><path d="m9 20 2-3 1-3.5M15 20l-1-3-1-3.5"></path></svg></script>
    <script type="text/x-template" id="svg-drag"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="9" cy="19" r="1.2"/><circle cx="15" cy="5" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="15" cy="19" r="1.2"/></svg></script>
    <script type="text/x-template" id="svg-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"></path></svg></script>
    <script type="text/x-template" id="svg-camera"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></script>

    <script>
        const { createApp, ref, reactive, computed, nextTick, watch, onMounted } = Vue;

        // --- 核心雲端金鑰 (由截圖 Image 1 填入) ---
        const firebaseConfig = {
          apiKey: "AIzaSyA81nyMXbE3AZVw-ffD-Wua",
          authDomain: "travel-43eb1.firebaseapp.com",
          projectId: "travel-43eb1",
          storageBucket: "travel-43eb1.appspot.com",
          messagingSenderId: "642234143171",
          appId: "1:642234143171:web:13eb98dff90e0c05f56784"
        };

        const appId = 'travel-shared-official-v15';

        createApp({
            components: { 
                SvgPlane: { template: '#svg-plane' }, SvgFood: { template: '#svg-food' }, 
                SvgAttraction: { template: '#svg-attraction' }, SvgHotel: { template: '#svg-hotel' }, 
                SvgShopping: { template: '#svg-shopping' }, SvgTaxi: { template: '#svg-taxi' }, 
                SvgSubway: { template: '#svg-subway' }, SvgWalk: { template: '#svg-walk' }, 
                SvgDrag: { template: '#svg-drag' }, SvgClose: { template: '#svg-close' }, 
                SvgCamera: { template: '#svg-camera' } 
            },
            setup() {
                const isStarted = ref(false);
                const currentTab = ref('schedule');
                const activeDayIndex = ref(0);
                const showTripList = ref(false);
                const deleteTarget = ref(null);
                const isSynced = ref(true);
                const isLoading = ref(true);
                const trips = ref([]);
                const activeTripId = ref(null);
                const newTripData = reactive({ destination: '', startDate: '', endDate: '' });
                let db;

                onMounted(async () => {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, onSnapshot, query } = window.FB;
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    const auth = getAuth(app);
                    await signInAnonymously(auth);

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'trips'));
                            onSnapshot(q, (snapshot) => {
                                const cloudData = [];
                                snapshot.forEach((doc) => cloudData.push({ id: doc.id, ...doc.data() }));
                                trips.value = cloudData;
                                if (trips.value.length > 0 && !activeTripId.value) {
                                    activeTripId.value = trips.value[0].id;
                                    isStarted.value = true;
                                }
                                isLoading.value = false;
                            }, (err) => {
                                console.error("Firebase Sync Error", err);
                                isLoading.value = false;
                            });
                        }
                    });
                });

                const isReady = computed(() => newTripData.destination && newTripData.startDate && newTripData.endDate);
                const currentTrip = computed(() => trips.value.find(t => t.id === activeTripId.value) || null);
                const activeDay = computed(() => currentTrip.value ? currentTrip.value.schedule[activeDayIndex.value] : { items: [] });
                const shoppingActivities = computed(() => currentTrip.value ? activeDay.value.items.filter(item => item.type === 'activity' && item.category !== '住宿') : []);

                let syncTimer;
                const saveCurrentTrip = () => {
                    if (!currentTrip.value || !db) return;
                    isSynced.value = false;
                    clearTimeout(syncTimer);
                    syncTimer = setTimeout(async () => {
                        const { doc, setDoc } = window.FB;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', currentTrip.value.id), JSON.parse(JSON.stringify(currentTrip.value)));
                        isSynced.value = true;
                    }, 1200);
                };

                const createFirstTrip = async () => {
                    const start = new Date(newTripData.startDate);
                    const end = new Date(newTripData.endDate);
                    const diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    const schedule = Array.from({ length: diff }, (_, i) => {
                        const d = new Date(start); d.setDate(start.getDate() + i);
                        return { date: d.toISOString().split('T')[0], items: [] };
                    });
                    const id = 'trip-' + Date.now();
                    const trip = { id, destination: newTripData.destination, startDate: newTripData.startDate, endDate: newTripData.endDate, schedule };
                    const { doc, setDoc } = window.FB;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', id), trip);
                    activeTripId.value = id;
                    isStarted.value = true;
                    newTripData.destination = '';
                };

                const switchTrip = (id) => { activeTripId.value = id; activeDayIndex.value = 0; showTripList.value = false; };
                const startNewTripFlow = () => { showTripList.value = false; isStarted.value = false; };
                const saveTripName = (t) => saveCurrentTrip();
                const addItem = (type) => {
                    const newItem = { id: 'id-' + Date.now() + Math.random().toString(36).substr(2, 4), type, timeStart: '10:00' };
                    if (type === 'flight') Object.assign(newItem, { timeEnd: '12:00', airportStart: '', airportEnd: '', flightType: 'intl' });
                    else if (type === 'activity') Object.assign(newItem, { title: '', category: '景點', address: '', note: '', shopping: [] });
                    else if (type === 'transport') Object.assign(newItem, { mode: 'subway', duration: 30 });
                    activeDay.value.items.push(newItem);
                    saveCurrentTrip();
                };
                const removeItem = (idx) => { if(confirm('確定要刪除嗎？')) { activeDay.value.items.splice(idx, 1); saveCurrentTrip(); } };
                const confirmDelete = (id) => deleteTarget.value = id;
                const doDelete = async () => {
                    const { doc, deleteDoc } = window.FB;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', deleteTarget.value));
                    deleteTarget.value = null;
                };
                const addShopping = (act) => { act.shopping.push({ id: 'shop-' + Date.now(), name: '', note: '', photo: null }); saveCurrentTrip(); };
                const handleImage = (shop, event) => {
                    const file = event.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => { shop.photo = e.target.result; saveCurrentTrip(); };
                        reader.readAsDataURL(file);
                    }
                };
                const formatShortDate = (dateStr) => {
                    const d = new Date(dateStr);
                    return `${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;
                };
                let sortableInstance = null;
                watch([activeDayIndex, currentTab, activeTripId, isStarted], () => {
                    if (currentTab.value === 'schedule' && isStarted.value) {
                        nextTick(() => {
                            const el = document.getElementById('sortable-schedule');
                            if (!el) return;
                            if (sortableInstance) sortableInstance.destroy();
                            sortableInstance = new Sortable(el, {
                                handle: '.drag-handle', animation: 250, ghostClass: 'sortable-ghost',
                                onEnd: (evt) => {
                                    const items = [...activeDay.value.items];
                                    const [movedItem] = items.splice(evt.oldIndex, 1);
                                    items.splice(evt.newIndex, 0, movedItem);
                                    activeDay.value.items = items;
                                    saveCurrentTrip();
                                }
                            });
                        });
                    }
                });
                const getCategorySVG = (cat) => ({ '美食': 'svg-food', '景點': 'svg-attraction', '購物': 'svg-shopping', '住宿': 'svg-hotel' }[cat] || 'svg-attraction');
                const getTransportSVG = (mode) => ({ taxi: 'svg-taxi', subway: 'svg-subway', walk: 'svg-walk' }[mode] || 'svg-walk');

                return { isStarted, currentTab, activeDayIndex, newTripData, trips, activeTripId, showTripList, deleteTarget, isSynced, isLoading, isReady, currentTrip, activeDay, shoppingActivities, createFirstTrip, switchTrip, startNewTripFlow, addItem, removeItem, confirmDelete, doDelete, addShopping, handleImage, formatShortDate, getCategorySVG, getTransportSVG, saveCurrentTrip, saveTripName };
            }
        }).mount('#app');
    </script>
</body>
</html>
